name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production web app
        working-directory: artifacts/tattva-finance
        run: pnpm run build
        env:
          PORT: "4173"
          BASE_PATH: "/"
          NODE_ENV: production

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor sync
        working-directory: artifacts/tattva-finance
        run: npx cap sync android --inline

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('artifacts/tattva-finance/android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle executable
        working-directory: artifacts/tattva-finance/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: artifacts/tattva-finance/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tattva-finance-debug-apk
          path: artifacts/tattva-finance/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
