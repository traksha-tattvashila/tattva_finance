kind = "web"
previewPath = "/"
title = "Tattva Finance"
version = "1.0.0"
id = "artifacts/tattva-finance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18546

[services.development]
run = "pnpm --filter @workspace/tattva-finance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tattva-finance", "run", "build" ]
publicDir = "artifacts/tattva-finance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18546"
BASE_PATH = "/"
